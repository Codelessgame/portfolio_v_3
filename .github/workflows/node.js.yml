name: Build and Deploy Angular

on:
  push:
    branches: [ "master" ] # Your URL indicates you are using the master branch

# Required permission to push the compiled code to the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Build Angular Project for GitHub Pages
      # I have automatically inserted your repository name here
      run: npx ng build --configuration production --base-href /portfolio_v_3/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        # IMPORTANT: Make sure this path matches your local build output!
        publish_dir: ./dist/portfolio_v_3/browser
